spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/userservice}
    username: ${DB_USERNAME:userservice_user}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

logging:
  level:
    root: warn
    com.example.userservice: info